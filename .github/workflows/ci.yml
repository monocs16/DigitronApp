name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: fast quality gate ──────────────────────────────────────────────
  quality:
    name: Lint · Type check · Unit tests · Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint (includes security rules)
        run: pnpm run lint

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level moderate
        continue-on-error: false

      - name: Unit tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

  # ─── Job 2: E2E against local Supabase ─────────────────────────────────────
  e2e:
    name: E2E tests (Playwright + Supabase)
    runs-on: ubuntu-latest
    # Only run E2E on PRs to main and direct pushes to main — skip on feature pushes.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local Supabase
        run: supabase start
        timeout-minutes: 5

      - name: Export Supabase credentials to environment
        run: |
          eval "$(supabase status -o env)"
          echo "VITE_SUPABASE_URL=$API_URL"                  >> $GITHUB_ENV
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY"     >> $GITHUB_ENV
          echo "SUPABASE_URL=$API_URL"                       >> $GITHUB_ENV
          echo "SUPABASE_PUBLISHABLE_KEY=$ANON_KEY"          >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV

      - name: Seed admin user
        run: |
          API_URL=$VITE_SUPABASE_URL \
          SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY \
          node scripts/seed-admin.mjs

      - name: Install Playwright + Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Start dev server in background
        run: CF_WORKERS=0 pnpm exec vite dev &

      - name: Wait for dev server to be ready
        run: |
          timeout 60 bash -c \
            'until curl -sf http://localhost:5173 > /dev/null 2>&1; do sleep 1; done'

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/results/
          retention-days: 7
          if-no-files-found: ignore
